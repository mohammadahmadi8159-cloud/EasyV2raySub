name: Generate V2Ray Links

on:
  schedule:
    - cron: '0 */2 * * *' # Every 2 hours
  workflow_dispatch:

jobs:
  generate-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests>=2.32.3 beautifulsoup4>=4.12.3

      - name: Run generate.py
        run: python generate.py --url trojan://_bfX%29l%3CqD2zhfyE%5E@wandering-sky-c208.ma351524.workers.dev:2086?security=tls&insecure=0&allowInsecure=0&type=ws&host=wandering-sky-c208.ma351524.workers.dev&path=%2FeyJqdW5rIjoiZTdHUnNENXkxdEYzVzJBdiIsInByb3RvY29sIjoidHIiLCJtb2RlIjoicHJveHlpcCIsInBhbmVsSVBzIjpbXX0%3D%3Fed%3D2560#1%20-%20Trojan%20-%20Domain%20%3A%202086 trojan://_bfX%29l%3CqD2zhfyE%5E@www.speedtest.net:2086?security=tls&insecure=0&allowInsecure=0&type=ws&host=wandering-sky-c208.ma351524.workers.dev&path=%2FeyJqdW5rIjoiZmRBV0JJRDFCNHVLbWxxIiwicHJvdG9jb2wiOiJ0ciIsIm1vZGUiOiJwcm94eWlwIiwicGFuZWxJUHMiOltdfQ%3D%3D%3Fed%3D2560#2%20-%20Trojan%20-%20Domain%20%3A%202086
      - name: Check for file changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "No changes detected."
            echo "has_changes=false" >> $GITHUB_ENV
          else
            echo "Changes detected."
            echo "has_changes=true" >> $GITHUB_ENV
          fi

      - name: Commit and push updated links
        if: env.has_changes == 'true'
        run: |
          git config --local user.name "GitHub Actions Bot"
          git config --local user.email "<>"
          git add links.txt
          git commit -m "Update links.txt"
          git push
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
